<svg width="320" height="80" viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Expunge Alternate Logo (Shield) — Transparent White</title>
  <desc>Shield mark with E letterform and EXPUNGE wordmark, transparent background, white text</desc>
  <!-- shield -->
  <path d="M26 10 L48 10 L48 44 Q48 60 26 70 Q4 60 4 44 L4 10 Z" fill="none" stroke="#2D6BE4" stroke-width="2.5"/>
  <!-- E letterform in shield -->
  <line x1="13" y1="26" x2="39" y2="26" stroke="#E63946" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="13" y1="38" x2="34" y2="38" stroke="#E63946" stroke-width="3" stroke-linecap="round"/>
  <line x1="13" y1="50" x2="39" y2="50" stroke="#E63946" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="13" y1="26" x2="13" y2="50" stroke="#E63946" stroke-width="3.5" stroke-linecap="round"/>
  <!-- wordmark -->
  <text x="62" y="55" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="700" fill="#FFFFFF" letter-spacing="1.5">EXPUNGE</text>
</svg>
