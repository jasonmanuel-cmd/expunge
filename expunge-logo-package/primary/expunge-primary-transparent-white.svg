<svg width="320" height="80" viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Expunge Primary Logo — Transparent, White Text</title>
  <desc>Struck record mark with EXPUNGE wordmark, transparent background, white text version for dark surfaces</desc>
  <!-- document outline -->
  <rect x="10" y="12" width="34" height="44" rx="5" fill="none" stroke="#2D6BE4" stroke-width="2.5"/>
  <!-- folded corner crease -->
  <polyline points="32,12 44,26 32,26" fill="none" stroke="#2D6BE4" stroke-width="2" stroke-linejoin="round"/>
  <!-- document lines -->
  <line x1="16" y1="34" x2="40" y2="34" stroke="#4a7fa8" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="42" x2="40" y2="42" stroke="#4a7fa8" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="50" x2="30" y2="50" stroke="#4a7fa8" stroke-width="1.5" stroke-linecap="round"/>
  <!-- red X strike -->
  <line x1="10" y1="12" x2="44" y2="56" stroke="#E63946" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="44" y1="12" x2="10" y2="56" stroke="#E63946" stroke-width="3.5" stroke-linecap="round"/>
  <!-- wordmark -->
  <text x="62" y="55" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="700" fill="#FFFFFF" letter-spacing="1.5">EXPUNGE</text>
</svg>
